<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwasthyaAI — Consultation</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg-main);
    }
    .chat-header {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .chat-header-back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .chat-header-back:hover {
      background: #F0FDFA;
      color: var(--primary);
    }
    .chat-header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }
    .chat-header-status {
      font-size: 12px;
      color: var(--success);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      animation: statusPulse 2s infinite;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 160px;
    }
    .bubble-wrapper-ai { display: flex; justify-content: flex-start; }
    .bubble-wrapper-user { display: flex; justify-content: flex-end; }
    .bubble-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .bubble-meta-ai { text-align: left; }
    .bubble-meta-user { text-align: right; }

    .chat-input-area {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 720px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 16px 20px;
    }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .chat-input {
      flex: 1;
      padding: 13px 20px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
    }
    .chat-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(15, 118, 110, 0.25);
      transition: all 0.2s;
    }
    .send-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .send-btn:disabled {
      background: var(--border);
      box-shadow: none;
      cursor: not-allowed;
    }
    .end-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #FECACA;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .end-btn:hover { background: #FEF2F2; border-color: var(--danger); }

    .typing-wrapper { display: flex; justify-content: flex-start; }

    /* Emergency Modal */
    .emergency-modal {
      background: white;
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 440px;
      border-top: 4px solid var(--danger);
      padding: 32px;
    }
    .emergency-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 8px;
    }
    .emergency-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .emergency-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--danger);
      text-align: center;
      padding: 20px;
      background: #FEF2F2;
      border-radius: var(--radius-md);
      margin: 16px 0;
    }
    .hospital-item {
      padding: 12px 16px;
      background: var(--bg-main);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
    }
    .hospital-name { font-size: 14px; font-weight: 600; }
    .hospital-address { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .hospital-link {
      font-size: 12px; color: var(--primary);
      text-decoration: none; margin-top: 4px;
      display: inline-block; font-weight: 600;
    }

    /* Completion banner */
    .completion-banner {
      background: #ECFDF5;
      border-left: 4px solid var(--success);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin: 10px 0;
      font-size: 14px;
      color: #047857;
      font-weight: 500;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="chat-page">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-back"
           onclick="window.location.href='dashboard.html'">
        <span class="material-symbols-rounded">arrow_back</span>
      </div>
      <div style="flex:1;">
        <div class="chat-header-title">AI Consultation</div>
        <div class="chat-header-status" id="agent-status">
          <span style="font-size:8px;">●</span> Agent 1 Active
        </div>
      </div>
      <div id="session-id-display"
           style="font-size:11px;color:var(--text-muted);"></div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages"></div>

  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <div class="input-row">
      <input type="text" class="chat-input" id="message-input"
             placeholder="Describe your symptoms..."
             onkeypress="handleKeyPress(event)">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <span class="material-symbols-rounded" style="font-size:20px;">send</span>
      </button>
    </div>
    <button class="end-btn" onclick="endConsultation()">
      End Consultation
    </button>
  </div>

  <!-- Emergency Modal -->
  <div class="modal-overlay" id="emergency-modal">
    <div class="emergency-modal">
      <div class="emergency-title">⚠️ Emergency Detected!</div>
      <div class="emergency-subtitle">
        Please seek immediate medical attention or call:
      </div>
      <div class="emergency-number">📞 108</div>
      <div id="hospitals-list"></div>
      <button class="btn btn-primary" style="margin-top:12px;background:var(--danger);"
              onclick="closeEmergencyModal()">
        I understand — Close
      </button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/consultation.js"></script>
</body>
</html>
