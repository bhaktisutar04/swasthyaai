<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwasthyaAI — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .greeting { font-size: 28px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.03em; }
    .date-text { color: var(--text-muted); font-size: 14px; }

    .quick-actions { display: flex; gap: 16px; margin-bottom: 24px; }
    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .stat-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card {
      flex: 1;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.nutrition::after { background: var(--success); }
    .stat-card.expense::after { background: var(--warning); }

    .stat-value { font-size: 32px; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
    .stat-change { font-size: 12px; margin-top: 8px; font-weight: 600; }

    .notification-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .notification-item:last-child { border-bottom: none; }
    .notif-icon-box {
      width: 40px; height: 40px;
      background: var(--primary-glow);
      color: var(--primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .notif-message { font-size: 14px; font-weight: 500; color: var(--text-main); }
    .notif-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .condition-badge {
      display: inline-flex;
      padding: 6px 14px;
      background: #F0FDFA;
      color: var(--primary);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0;
    }

    /* Desktop Sidebar */
    .desktop-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid var(--border);
      padding: 32px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      display: none;
    }
    .sidebar-logo {
      padding: 0 28px 32px;
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.03em;
    }
    .main-content { flex: 1; padding: 32px 40px; max-width: 960px; margin: 0 auto; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 28px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s, background 0.2s;
    }
    .sidebar-item:hover { color: var(--primary); background: #F0FDFA; }
    .sidebar-item.active {
      color: var(--primary);
      background: var(--primary-glow);
      border-right: 3px solid var(--primary);
      font-weight: 600;
    }

    @media (min-width: 768px) {
      .sidebar { display: block; }
      .top-bar { display: none; }
      .stat-row { display: grid; grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- Top Bar (Mobile) -->
  <div class="top-bar">
    <div class="top-bar-title">SwasthyaAI</div>
    <div id="user-initial-box">
      <span id="user-initial" style="width:36px;height:36px;background:var(--primary);
            color:white;border-radius:12px;display:flex;align-items:center;
            justify-content:center;font-weight:700;font-size:14px;">R</span>
    </div>
  </div>

  <div class="desktop-layout">
    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
      <div class="sidebar-logo">SwasthyaAI</div>
      <nav>
        <a href="dashboard.html" class="sidebar-item active">
          <span class="material-symbols-rounded">dashboard</span>
          <span>Dashboard</span>
        </a>
        <a href="consultation.html" class="sidebar-item">
          <span class="material-symbols-rounded">medical_services</span>
          <span>Consultation</span>
        </a>
        <a href="nutrition.html" class="sidebar-item">
          <span class="material-symbols-rounded">nutrition</span>
          <span>Nutrition</span>
        </a>
        <a href="expenses.html" class="sidebar-item">
          <span class="material-symbols-rounded">payments</span>
          <span>Expenses</span>
        </a>
        <a href="history.html" class="sidebar-item">
          <span class="material-symbols-rounded">history</span>
          <span>History</span>
        </a>
        <div class="divider"></div>
        <a href="#" class="sidebar-item" onclick="logout()">
          <span class="material-symbols-rounded">logout</span>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page">
        
        <!-- Header Section -->
        <header class="mb-20">
          <h1 class="greeting" id="greeting-text">Good Morning! 👋</h1>
          <p class="date-text" id="date-text"></p>
        </header>

        <div class="dashboard-grid">
          
          <!-- Quick Actions -->
          <div class="quick-actions full-width">
            <button class="btn btn-primary action-btn" onclick="window.location.href='consultation.html'">
              <span class="material-symbols-rounded">add_circle</span>
              Start New Consultation
            </button>
            <button class="btn btn-outline action-btn" onclick="window.location.href='history.html'">
              <span class="material-symbols-rounded">folder_open</span>
              View Health History
            </button>
          </div>
          
          <!-- Stats Cards -->
          <div class="stat-row full-width">
            <div class="stat-card nutrition">
              <div class="stat-value" id="nutrition-score">--</div>
              <div class="stat-label">Nutrition Score</div>
              <div class="stat-change" id="nutrition-change"></div>
            </div>
            <div class="stat-card expense">
              <div class="stat-value" id="expense-total">--</div>
              <div class="stat-label">This Month's Spending</div>
              <div class="stat-change" id="expense-change"></div>
            </div>
          </div>
          
          <!-- Latest Consultation -->
          <div class="card" id="consultation-card">
            <div class="card-title">
              <span>Latest Assessment</span>
              <span class="material-symbols-rounded" style="font-size:18px">description</span>
            </div>
            <div id="consultation-content">
              <div class="skeleton" style="height:20px; width:80%; margin-bottom:12px; border-radius:4px;"></div>
              <div class="skeleton" style="height:20px; width:50%; border-radius:4px;"></div>
            </div>
          </div>

          <!-- Reminders -->
          <div class="card">
            <div class="card-title">
              <span>Care Reminders</span>
              <span class="material-symbols-rounded" style="font-size:18px">notifications</span>
            </div>
            <div id="notifications-list">
              <div class="skeleton" style="height:20px; width:70%; margin-bottom:12px; border-radius:4px;"></div>
              <div class="skeleton" style="height:20px; width:90%; border-radius:4px;"></div>
            </div>
          </div>

          <!-- Nutrition Chart -->
          <!-- <div class="card full-width">
            <div class="card-title">
              <span>Nutrition Analytics</span>
              <span class="material-symbols-rounded" style="font-size:18px">show_chart</span>
            </div>
            <div style="height: 200px;">
              <canvas id="nutrition-chart"></canvas>
            </div>
          </div> -->

        </div>
      </div>
    </main>
  </div>

  <!-- Bottom Nav (Mobile Only) -->
  <div id="bottom-nav"></div>

  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
